<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Doodle Relay</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>
<div id="app">

  <header id="topbar">
    <div class="brand" id="brand">Doodle<span>Relay</span></div>
    <div class="topbar-right">
      <span id="auth-status" class="auth-status"></span>
      <button id="auth-btn" class="btn btn-ghost btn-sm">Sign in</button>
    </div>
  </header>

  <main id="screens">

    <section id="screen-home" class="screen active">
      <div class="home-card">
        <h1 class="home-title">Doodle<span>Relay</span></h1>
        <p class="home-sub">Write it. Draw it. Watch it fall apart.</p>

        <div class="identity">
          <button id="avatar-pick" class="avatar-big" title="Change avatar">🐱</button>
          <input id="name-input" class="input" maxlength="20" placeholder="Your name">
        </div>

        <div class="home-actions">
          <button id="create-btn" class="btn btn-primary btn-lg">Create room</button>
          <div class="join-row">
            <input id="code-input" class="input code-input" maxlength="6" placeholder="CODE">
            <button id="join-btn" class="btn btn-secondary">Join</button>
          </div>
          <label class="checkbox-row">
            <input type="checkbox" id="public-toggle"> Make room public
          </label>
        </div>

        <div class="public-rooms">
          <div class="public-head">
            <span>Public rooms</span>
            <button id="refresh-public" class="btn btn-ghost btn-xs">Refresh</button>
          </div>
          <div id="public-list" class="public-list"></div>
        </div>
      </div>
    </section>

    <section id="screen-lobby" class="screen">
      <div class="lobby-grid">
        <div class="panel players-panel">
          <div class="panel-head">
            <span>Players (<span id="player-count">0</span>)</span>
            <span class="room-code" id="lobby-code"></span>
          </div>
          <div id="player-list" class="player-list"></div>
          <div class="lobby-room-actions">
            <button id="copy-link" class="btn btn-ghost btn-sm">Copy invite</button>
          </div>
        </div>

        <div class="panel center-panel">
          <div id="host-settings" class="settings-wrap"></div>
          <div class="lobby-cta">
            <button id="ready-btn" class="btn btn-secondary btn-lg">Ready</button>
            <button id="start-btn" class="btn btn-primary btn-lg" disabled>Start game</button>
            <button id="leave-btn" class="btn btn-ghost">Leave</button>
          </div>
        </div>

        <div class="panel chat-panel">
          <div class="panel-head"><span>Chat</span></div>
          <div id="chat-log" class="chat-log"></div>
          <div class="chat-input-row">
            <input id="chat-input" class="input" maxlength="200" placeholder="Say something">
            <button id="chat-send" class="btn btn-secondary btn-sm">Send</button>
          </div>
        </div>
      </div>
    </section>

    <section id="screen-game" class="screen">
      <div class="game-top">
        <div class="phase-label" id="phase-label">Get ready</div>
        <div class="timer" id="timer">--</div>
        <div class="round-label" id="round-label"></div>
      </div>

      <div id="phase-prompt" class="phase-view">
        <h2 class="phase-title">Write a prompt</h2>
        <p class="phase-hint">Something fun for the next person to draw.</p>
        <input id="prompt-input" class="input prompt-input" maxlength="120" placeholder="Type your prompt">
        <button id="prompt-submit" class="btn btn-primary btn-lg">Submit</button>
        <button id="prompt-random" class="btn btn-ghost btn-sm">Random prompt</button>
      </div>

      <div id="phase-drawing" class="phase-view">
        <div class="draw-source" id="draw-source"></div>
        <div id="canvas-wrap" class="canvas-wrap"></div>
        <div id="toolbar" class="toolbar"></div>
        <button id="drawing-submit" class="btn btn-primary btn-lg">Submit drawing</button>
      </div>

      <div id="phase-description" class="phase-view">
        <h2 class="phase-title">What is this?</h2>
        <div id="desc-image" class="desc-image"></div>
        <input id="desc-input" class="input prompt-input" maxlength="120" placeholder="Describe what you see">
        <button id="desc-submit" class="btn btn-primary btn-lg">Submit</button>
      </div>

      <div id="phase-waiting" class="phase-view">
        <div class="spinner"></div>
        <h2 class="phase-title">Waiting for others</h2>
        <div id="waiting-list" class="waiting-list"></div>
      </div>
    </section>

    <section id="screen-reveal" class="screen">
      <div class="reveal-top">
        <div class="reveal-title">The results</div>
        <div class="reveal-nav">
          <button id="reveal-prev" class="btn btn-ghost btn-sm">Prev</button>
          <span id="reveal-pos" class="reveal-pos"></span>
          <button id="reveal-next" class="btn btn-ghost btn-sm">Next</button>
        </div>
      </div>
      <div id="reveal-stage" class="reveal-stage"></div>
      <div class="reveal-controls">
        <button id="reveal-step" class="btn btn-primary">Next step</button>
        <button id="reveal-auto" class="btn btn-secondary">Auto play</button>
        <button id="reveal-full" class="btn btn-ghost btn-sm">Fullscreen</button>
        <button id="reveal-home" class="btn btn-ghost btn-sm">Back to lobby</button>
      </div>
    </section>

  </main>

  <div id="modal-root"></div>
  <div id="toasts"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="scripts/config.js"></script>
<script src="scripts/utils.js"></script>
<script src="scripts/supabase.js"></script>
<script src="scripts/realtime.js"></script>
<script src="scripts/chat.js"></script>
<script src="scripts/canvas.js"></script>
<script src="scripts/drawing.js"></script>
<script src="scripts/settings.js"></script>
<script src="scripts/reveal.js"></script>
<script src="scripts/room.js"></script>
<script src="scripts/lobby.js"></script>
<script src="scripts/game.js"></script>
<script src="scripts/app.js"></script>
</body>
</html>
